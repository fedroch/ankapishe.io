
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .scene {
    position: relative;
    width: 100%;
    max-width: 780px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
  }

  .landscape {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 24px 20px 28px;
  }

  h1 {
    font-family: 'Impact', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    color: #FFE566;
    text-align: center;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow:
      3px 3px 0 #8B0000,
      -1px -1px 0 #8B0000,
      1px -1px 0 #8B0000,
      -1px 1px 0 #8B0000,
      0 0 20px rgba(255,200,0,0.5);
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }

  .cell {
    background: rgba(10, 15, 40, 0.72);
    border: 2px solid rgba(255, 220, 80, 0.55);
    border-radius: 6px;
    padding: 10px 8px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(10px, 1.4vw, 14px);
    color: #F0F0F0;
    line-height: 1.25;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, border-color 0.2s;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .cell:hover {
    background: rgba(255, 200, 50, 0.18);
    border-color: #FFE566;
    transform: scale(1.04);
    z-index: 10;
    color: #FFE566;
  }

  .cell.marked {
    background: rgba(180, 30, 30, 0.75);
    border-color: #FF6060;
    color: #FFE566;
  }

  .cell.marked::after {
    content: '✓';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 14px;
    color: #FF9999;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div class="scene">
  <svg class="landscape" viewBox="0 0 780 680" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <!-- Sky gradient -->
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0a0520"/>
        <stop offset="35%" stop-color="#1a1060"/>
        <stop offset="65%" stop-color="#3a1a6e"/>
        <stop offset="85%" stop-color="#c04a20"/>
        <stop offset="100%" stop-color="#e0720a"/>
      </linearGradient>
      <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c04a20" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#1a1060" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#050218"/>
      </linearGradient>
      <linearGradient id="sun" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" id="sunGrad" gradientUnits="objectBoundingBox">
        <stop offset="0%" stop-color="#FFF7A0"/>
        <stop offset="40%" stop-color="#FFD060"/>
        <stop offset="100%" stop-color="#FF7010" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFF7A0"/>
        <stop offset="40%" stop-color="#FFD060"/>
        <stop offset="100%" stop-color="#FF7010" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFFDE0"/>
        <stop offset="60%" stop-color="#FFFDE0" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#FFFDE0" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Sky -->
    <rect width="780" height="680" fill="url(#sky)"/>

    <!-- Stars -->
    <circle cx="60" cy="30" r="1.2" fill="white" opacity="0.9"/>
    <circle cx="120" cy="18" r="0.8" fill="white" opacity="0.7"/>
    <circle cx="200" cy="40" r="1" fill="white" opacity="0.8"/>
    <circle cx="310" cy="22" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="400" cy="10" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="500" cy="35" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="600" cy="15" r="0.7" fill="white" opacity="0.7"/>
    <circle cx="670" cy="45" r="1.3" fill="white" opacity="0.9"/>
    <circle cx="730" cy="25" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="150" cy="65" r="0.7" fill="white" opacity="0.5"/>
    <circle cx="450" cy="55" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="560" cy="70" r="1" fill="white" opacity="0.7"/>
    <circle cx="80" cy="80" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="700" cy="80" r="0.7" fill="white" opacity="0.6"/>

    <!-- Moon -->
    <circle cx="90" cy="90" r="28" fill="url(#moonGlow)" opacity="0.6"/>
    <circle cx="90" cy="90" r="18" fill="#FFFDE0"/>
    <circle cx="100" cy="84" r="15" fill="#1a1060"/>

    <!-- Sun glow on horizon -->
    <ellipse cx="390" cy="380" rx="200" ry="60" fill="#FF8020" opacity="0.25"/>
    <ellipse cx="390" cy="380" rx="100" ry="30" fill="#FFD060" opacity="0.2"/>

    <!-- Mountain range left - back -->
    <polygon points="0,340 80,200 160,290 240,180 320,250 380,350" fill="#1a1048"/>
    <!-- Mountain range right - back -->
    <polygon points="380,350 440,230 520,310 600,210 680,300 780,250 780,360" fill="#1a1048"/>

    <!-- Mountain range front -->
    <polygon points="0,380 60,260 130,330 200,240 280,320 340,280 400,360 460,270 530,350 600,260 660,330 720,280 780,320 780,400 0,400" fill="#120d3a"/>

    <!-- Foothills -->
    <polygon points="0,420 100,360 200,400 300,370 400,405 500,368 600,395 700,372 780,400 780,440 0,440" fill="#0d0a28"/>

    <!-- Water reflection -->
    <rect x="0" y="430" width="780" height="250" fill="url(#water)"/>

    <!-- Water shimmer lines -->
    <line x1="250" y1="460" x2="530" y2="460" stroke="#FFD060" stroke-width="1.5" opacity="0.6"/>
    <line x1="300" y1="475" x2="480" y2="475" stroke="#FFD060" stroke-width="1" opacity="0.4"/>
    <line x1="330" y1="490" x2="450" y2="490" stroke="#FFAA40" stroke-width="0.8" opacity="0.35"/>
    <line x1="270" y1="505" x2="510" y2="505" stroke="#FF8020" stroke-width="0.7" opacity="0.25"/>
    <line x1="200" y1="450" x2="580" y2="450" stroke="#FF9030" stroke-width="2" opacity="0.3"/>

    <!-- Dark treeline -->
    <path d="M0,440 Q20,420 40,435 Q60,410 80,430 Q100,415 120,432 Q140,418 160,435 Q180,420 200,437 Q220,415 240,432 Q260,418 280,435 Q300,420 320,437 Q340,415 360,432 Q380,418 400,435 Q420,420 440,432 Q460,415 480,432 Q500,420 520,437 Q540,415 560,432 Q580,420 600,437 Q620,418 640,432 Q660,415 680,432 Q700,420 720,437 Q740,418 760,432 Q770,425 780,435 L780,450 L0,450 Z" fill="#080618"/>

    <!-- Pine trees silhouette -->
    <polygon points="50,435 58,400 66,435" fill="#060414"/>
    <polygon points="56,435 65,395 74,435" fill="#080618"/>
    <polygon points="130,435 140,398 150,435" fill="#060414"/>
    <polygon points="138,435 148,392 158,435" fill="#080618"/>
    <polygon points="620,435 630,400 640,435" fill="#060414"/>
    <polygon points="628,435 638,395 648,435" fill="#080618"/>
    <polygon points="700,435 710,402 720,435" fill="#060414"/>
    <polygon points="708,435 718,396 728,435" fill="#080618"/>

    <!-- Foreground ground -->
    <rect x="0" y="440" width="780" height="20" fill="#060414" opacity="0.9"/>
  </svg>

  <div class="content">
    <h1>БИНГО АНКАПИЩЕ</h1>
    <div class="grid" id="bingo-grid">
    </div>
  </div>
</div>

<script>
  const cells = [
    "ХУЕПЫЖИТ ЕБАНУТО / КОНКРЕТНО",
    "Я БЫ УБИВАЛ",
    "ДОБРОЕ УТРО ФУРФУРОЛ",
    "ОБЕД БЕЗБРАЧИЯ",
    "КРУЖОК С СИГАРЕТОЙ, МОТАНИЕМ ГОЛОВОЙ И «ПИЗДЕЦ»",
    "У МЕНЯ НЕТ ЛИЧНОСТИ",
    "Я ЭДУАРД КИЧИГИН",
    "В.О. 2",
    "ОТЧИСЛЕНИЕ",
    "ЖИВОТИНКИ",
    "ДЭВИД ЛИНЧ",
    "ШРИФТ ИМПАКТ + ПЕЙЗАЖ",
    "ШМАЛЬНУ СЕБЕ В ЖБАН",
    "ШКАЛЯТ ДАТЧИКИ",
    "Я И КТО",
    "1488",
    "ЕЩЁ ЧУТЬ-ЧУТЬ И МОЖНО ПОЖИТЬ",
    "ПОЧЕМУ",
    "ЗАЛАЛДУУ ШИШИКТЕР",
    "МУЗЫКАНТЫ МАЛЬЧИКИ",
    "ОКСИ / ТОМ ЙОРК АНАЛЬНЫЙ ГОВНОСОС",
    "БЛЯ ТУПО РАНДОМНАЯ ЦИТАТА ОКСИ БЕЗ КОНТЕКСТА",
    "НА ТАКОМ ЩА",
    "АНТОХА",
    "ГИФКА КРЫША ТЕЧЁТ / ЧУВАК ШМАЛЯЕТ С САЙГИ В ЖБАН"
  ];

  const grid = document.getElementById('bingo-grid');
  cells.forEach(text => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = text;
    cell.addEventListener('click', () => cell.classList.toggle('marked'));
    grid.appendChild(cell);
  });
</script>
</body>
</html>
