
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Impact&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    background: #0a1628;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .scene {
    position: relative;
    width: 100%;
    max-width: 780px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    background-image: url('meme.jpg');
    background-size: cover;
    background-position: center;
  }

  .landscape {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 24px 20px 28px;
  }

  h1 {
    font-family: 'Impact', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    color: #FFE566;
    text-align: center;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow:
      3px 3px 0 #8B0000,
      -1px -1px 0 #8B0000,
      1px -1px 0 #8B0000,
      -1px 1px 0 #8B0000,
      0 0 20px rgba(255,200,0,0.5);
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }

  .cell {
    background: rgba(10, 15, 40, 0.72);
    border: 2px solid rgba(255, 220, 80, 0.55);
    border-radius: 6px;
    padding: 10px 8px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(10px, 1.4vw, 14px);
    color: #F0F0F0;
    line-height: 1.25;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, border-color 0.2s;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .cell:hover {
    background: rgba(255, 200, 50, 0.18);
    border-color: #FFE566;
    transform: scale(1.04);
    z-index: 10;
    color: #FFE566;
  }

  .cell.marked {
    background: rgba(180, 30, 30, 0.75);
    border-color: #FF6060;
    color: #FFE566;
  }

  .cell.marked::after {
    content: '✓';
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 14px;
    color: #FF9999;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="content">
    <h1>БИНГО АНКАПИЩЕ</h1>
    <div class="grid" id="bingo-grid">
    </div>
  </div>
</div>

<script>
  const cells = [
    "ХУЕПЫЖИТ ЕБАНУТО / КОНКРЕТНО",
    "Я БЫ УБИВАЛ",
    "ДОБРОЕ УТРО ФУРФУРОЛ",
    "ОБЕД БЕЗБРАЧИЯ",
    "КРУЖОК С СИГАРЕТОЙ, МОТАНИЕМ ГОЛОВОЙ И «ПИЗДЕЦ»",
    "У МЕНЯ НЕТ ЛИЧНОСТИ",
    "Я ЭДУАРД КИЧИГИН",
    "В.О. 2",
    "ОТЧИСЛЕНИЕ",
    "ЖИВОТИНКИ",
    "ДЭВИД ЛИНЧ",
    "ШРИФТ ИМПАКТ + ПЕЙЗАЖ",
    "ШМАЛЬНУ СЕБЕ В ЖБАН",
    "ШКАЛЯТ ДАТЧИКИ",
    "Я И КТО",
    "1488",
    "ЕЩЁ ЧУТЬ-ЧУТЬ И МОЖНО ПОЖИТЬ",
    "ПОЧЕМУ",
    "ЗАЛАЛДУУ ШИШИКТЕР",
    "МУЗЫКАНТЫ МАЛЬЧИКИ",
    "ОКСИ / ТОМ ЙОРК АНАЛЬНЫЙ ГОВНОСОС",
    "БЛЯ ТУПО РАНДОМНАЯ ЦИТАТА ОКСИ БЕЗ КОНТЕКСТА",
    "НА ТАКОМ ЩА",
    "АНТОХА",
    "ГИФКА КРЫША ТЕЧЁТ / ЧУВАК ШМАЛЯЕТ С САЙГИ В ЖБАН"
  ];

  const grid = document.getElementById('bingo-grid');
  cells.forEach(text => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = text;
    cell.addEventListener('click', () => cell.classList.toggle('marked'));
    grid.appendChild(cell);
  });
</script>
</body>
</html>
